<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>報名成功 — 華市集 × 蔬味平生</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(150deg, #fff0f6 0%, #fde0ee 60%, #ffd6e7 100%);
      padding: 2rem;
    }
    .success-box {
      background: #fff;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(214,51,132,.15);
      border: 1px solid #f0d0e0;
    }
    .success-box .icon { font-size: 4rem; margin-bottom: 1.2rem; }
    .success-box h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.6rem;
      color: #1c1c2e;
      margin-bottom: .8rem;
    }
    .success-box p {
      font-size: .95rem;
      color: #666;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .line-box {
      background: #f0f9f0;
      border: 1px solid #a5d6a7;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      margin-bottom: 2rem;
    }
    .line-box p {
      margin-bottom: .3rem;
      font-size: .88rem;
      color: #388e3c;
    }
    .line-id {
      font-size: 1.2rem;
      font-weight: 700;
      color: #2e7d32;
      letter-spacing: 1px;
    }
    .back-link {
      display: inline-block;
      color: #d63384;
      font-size: .9rem;
      margin-top: 1rem;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="success-page">
    <div class="success-box">
      <div class="icon">🎉</div>
      <h1>報名資料已送出！</h1>
      <p>感謝你的報名！主辦方將依品項與整體規劃進行審核，錄取後會透過 Line 或電話通知你繳費。</p>

      <div class="line-box">
        <p>⚠️ 送出後請務必加入官方 Line，才能收到後續通知</p>
        <div class="line-id">@743nyxjm</div>
      </div>

      <p style="font-size:.85rem;color:#999;margin-bottom:.5rem">
        收到錄取通知後，請於 <strong>五天內</strong> 完成匯款，才算正式保留攤位。
      </p>

      <a href="index.html" class="back-link">← 返回活動頁面</a>
    </div>
  </div>

</html>
